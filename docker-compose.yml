version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: edmarg-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: edmarg_db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edmarg-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/edmarg_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      FRONTEND_ORIGIN: http://localhost:3000
      LOG_LEVEL: info
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edmarg-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api/v1
      NEXT_PUBLIC_BACKEND_URL: http://localhost:5000
      NEXT_PUBLIC_APP_NAME: EdMarg
      NEXT_PUBLIC_ENVIRONMENT: production
    depends_on:
      - backend

volumes:
  mongodb_data:
