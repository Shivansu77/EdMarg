# Nginx Configuration for Node.js Application (Backend)
# Place this file in /etc/nginx/sites-available/ and symlink to /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name api.edmarg.com; # Replace with your actual backend domain

    # Increase payload limits for image uploads if needed
    client_max_body_size 10M;

    location / {
        # Proxy to the PM2 Node.js server
        proxy_pass http://localhost:5000;
        
        # Standard Proxy Headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Real IP Forwarding
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
